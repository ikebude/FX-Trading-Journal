name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Publish Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Package Windows installer
        # --publish=never prevents electron-builder from auto-publishing to
        # GitHub when it detects a tag on CI. We handle the release upload
        # ourselves via softprops/action-gh-release below.
        run: node scripts/gen-icons.js && npx electron-vite build && npx electron-builder --win --publish=never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-windows-installer
          path: release/*.exe
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Upload the NSIS installer (.exe) AND the auto-update manifest
          # (latest.yml) so electron-updater can serve in-app update checks.
          files: |
            release/*.exe
            release/latest.yml
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
