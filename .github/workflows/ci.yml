name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type-check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        # postinstall runs electron-rebuild (-> Electron ABI). That binary
        # cannot be loaded by vitest under Node. We swap to the Node-ABI
        # prebuilt in the next step before tests run.

      - name: Swap better-sqlite3 to Node-ABI prebuilt (for vitest)
        run: npm run rebuild:node

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  build:
    name: Build (no installer)
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build
